<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>เบญจมราชาลัย 2568</title>
<style>
:root,[data-theme=dark]{
  --bg:#0D0D12;--bar:#16161F;--border:rgba(255,255,255,.07);
  --accent:#F43F5E;--text1:#E0E0F0;--text2:#9898B0;--text3:#50506A;
  --card-bg:#1C1C28;--card-hover:#22223A;
}
[data-theme=light]{
  --bg:#F0F0F8;--bar:#FFFFFF;--border:rgba(0,0,0,.09);
  --accent:#F43F5E;--text1:#18181E;--text2:#4A4A6A;--text3:#9090B0;
  --card-bg:#FFFFFF;--card-hover:#F4F4FC;
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text1);
  font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

#topbar{
  height:56px;background:var(--bar);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50}
.brand-name{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:-.4px}
.brand-logo{height:30px;width:auto;object-fit:contain}
.shelf-label{font-size:12px;color:var(--text3);margin-left:2px}
.spacer{flex:1}
.theme-btn{
  width:38px;height:38px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
  transition:background .12s,color .12s}
.theme-btn:hover{background:rgba(255,255,255,.09);color:var(--text2)}

#hero{padding:44px 24px 20px;text-align:center;max-width:640px;margin:0 auto}
#hero h1{font-size:28px;font-weight:800;margin:0 0 8px;color:var(--text1);letter-spacing:-.5px}
#hero p{font-size:14px;color:var(--text2);margin:0}

#shelf{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;padding:24px 24px 60px;max-width:1200px;margin:0 auto}
@media(max-width:600px){
  #shelf{grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 12px 40px}
  #hero{padding:28px 16px 16px}#hero h1{font-size:22px}}

.book-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.book-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.35);border-color:var(--accent)}
.book-cover{aspect-ratio:3/4;overflow:hidden;background:#1a1a2e;position:relative}
.book-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}
.book-card:hover .book-cover img{transform:scale(1.04)}
.cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1e1e32,#2a2a48)}
.cover-placeholder svg{opacity:.25}
.book-info{padding:12px 14px 14px}
.book-title{font-size:13px;font-weight:600;color:var(--text1);margin:0 0 4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-meta{font-size:11px;color:var(--text3)}
.book-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;
  font-size:10px;font-weight:600;color:var(--accent);
  background:rgba(123,110,246,.12);border-radius:4px;padding:3px 7px}

#footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="topbar">
  <span class="brand-name">เบญจมราชาลัย 2568</span>
  <span class="shelf-label">/ Shelf</span>
  <div class="spacer"></div>
  <button class="theme-btn" id="btn-theme" title="Toggle dark/light mode">
    <svg id="icon-sun" viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
      <path d="M8 12A4 4 0 1 1 8 4a4 4 0 0 1 0 8zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM8 1.5a.75.75 0 0 1 .75.75v1a.75.75 0 0 1-1.5 0v-1A.75.75 0 0 1 8 1.5z"/>
    </svg>
    <svg id="icon-moon" viewBox="0 0 16 16" fill="currentColor" width="14" height="14" style="display:none">
      <path d="M6 .278a.77.77 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
    </svg>
  </button>
</div>

<div id="hero">
  <h1>เบญจมราชาลัย 2568</h1>
  <p id="shelf-count"></p>
</div>

<div id="shelf"></div>

<div id="footer">Exported with PaperOS &middot; Open each book folder's <code>index.html</code> to read offline</div>

<script>
const BOOKS = [{"folder":"mq8pbiugbj6go","title":"เบญจมราชาลัย 2568","cover":"page-0001.jpg","totalPages":100,"coverWidgets":[{"type":"image","url":"./mq8pbiugbj6go/assets/___________________mqc12gga.png","label":"___________________mqc12gga","pageIndex":0,"x":28.97466719777963,"y":62.07132452426676,"width":52.8070068359375,"height":18.896462779693316,"opacity":100,"animation":"slideUp","id":"w-1781336960263-iwzo","animationDuration":1.1},{"type":"image","url":"./mq8pbiugbj6go/assets/Layer_25_mqc12gdl.png","label":"Layer_25_mqc12gdl","pageIndex":0,"x":8.506816663240155,"y":62.34719320116097,"width":19.863570363898024,"height":14.620313591131282,"opacity":100,"animation":"bounce","id":"w-1781336974999-8s1q","animationRepeat":3},{"type":"image","url":"./mq8pbiugbj6go/assets/Layer_86_copy_mqc12gi9.png","label":"Layer_86_copy_mqc12gi9","pageIndex":0,"x":18.83817331414476,"y":11.998895002255008,"width":60.99416632401316,"height":64.96864588788989,"opacity":100,"animation":"slideDown","id":"w-1781336989639-1onu","animationDuration":1.5},{"type":"image","url":"./mq8pbiugbj6go/assets/Light_copy_2_mqc12gf4.png","label":"Light_copy_2_mqc12gf4","pageIndex":0,"x":51.481515984786185,"y":0,"width":48.518484015213815,"height":40.13930564042132,"opacity":100,"animation":"blurIn","id":"w-1781337074801-251e","animationDuration":0.4,"animationMode":"loop"},{"type":"image","url":"./mq8pbiugbj6go/assets/Light_copy_mqc12gff.png","label":"Light_copy_mqc12gff","pageIndex":0,"x":0,"y":0,"width":49.10329718338816,"height":43.17400884361906,"opacity":100,"animation":"blurIn","id":"w-1781337086755-203e","animationMode":"loop","animationDuration":0.8}]}];
let isDark = true;
function applyTheme(){
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('icon-sun').style.display  = isDark ? 'block' : 'none';
  document.getElementById('icon-moon').style.display = isDark ? 'none'  : 'block';
}
document.getElementById('btn-theme').addEventListener('click',()=>{ isDark=!isDark; applyTheme(); });

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Composite the cover-page widgets over the cover image so the shelf thumbnail
// matches what the book's cover actually looks like (image widgets show their
// picture; media/link widgets show a small coloured chip).
function coverWidgetHtml(book){
  return (book.coverWidgets || []).map(function(w){
    var box = 'position:absolute;left:'+w.x+'%;top:'+w.y+'%;'+
      'width:'+(w.width!=null?w.width:20)+'%;height:'+(w.height!=null?w.height:15)+'%;'+
      'opacity:'+((w.opacity!=null?w.opacity:100)/100)+';overflow:hidden;';
    if(w.type === 'image' && w.url){
      return '<img src="'+esc(w.url)+'" alt="" loading="lazy" style="'+box+'object-fit:contain;"/>';
    }
    var bg =
      w.type === 'link'  ? 'background:rgba(59,130,246,.45);' :
      w.type === 'audio' ? 'background:rgba(16,185,129,.45);' :
                           'background:rgba(123,110,246,.45);';
    return '<div style="'+box+bg+'border-radius:2px;"></div>';
  }).join('');
}

function buildCards(){
  const shelf = document.getElementById('shelf');
  shelf.innerHTML = '';
  document.getElementById('shelf-count').textContent = BOOKS.length + ' book' + (BOOKS.length!==1?'s':'') + ' in this shelf';
  BOOKS.forEach(book => {
    const a = document.createElement('a');
    a.className = 'book-card';
    a.href = './' + esc(book.folder) + '/index.html';
    const coverHtml = book.cover
      ? '<img src="./'+ esc(book.folder) +'/pages/'+ esc(book.cover) +'" alt="'+esc(book.title)+'" loading="lazy"/>' + coverWidgetHtml(book)
      : '<div class="cover-placeholder"><svg viewBox="0 0 64 64" width="48" height="48" fill="none"><rect x="8" y="4" width="32" height="48" rx="3" stroke="white" stroke-width="2.5"/><rect x="16" y="12" width="16" height="2" rx="1" fill="white"/><rect x="16" y="18" width="20" height="2" rx="1" fill="white"/></svg></div>';
    a.innerHTML =
      '<div class="book-cover">' + coverHtml + '</div>' +
      '<div class="book-info">' +
        '<div class="book-title">' + esc(book.title) + '</div>' +
        '<div class="book-meta">' + (book.totalPages||0) + ' pages</div>' +
        '<span class="book-badge">&#9654; Open Book</span>' +
      '</div>';
    shelf.appendChild(a);
  });
}

buildCards();
applyTheme();
</script>
</body>
</html>
