<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>เบญจมราชาลัย 2568</title>
<style>
/* ── Theme variables ─────────────────────────────────────────────────── */
:root,[data-theme=dark]{
  --bg:#0D0D12;--bar:#16161F;--border:rgba(255,255,255,.07);
  --accent:#F43F5E;--text1:#E0E0F0;--text2:#9898B0;--text3:#50506A;
  --stage:#0D0D12;--btn-bg:rgba(255,255,255,.04);--btn-hover:rgba(255,255,255,.09);
}
[data-theme=light]{
  --bg:#F0F0F8;--bar:#FFFFFF;--border:rgba(0,0,0,.09);
  --accent:#F43F5E;--text1:#18181E;--text2:#4A4A6A;--text3:#9090B0;
  --stage:#E8E8F4;--btn-bg:rgba(0,0,0,.03);--btn-hover:rgba(0,0,0,.07);
}

/* ── Reset ───────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;
  background:var(--bg);color:var(--text1);
  font-family:system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
  /* Prevent pull-to-refresh and overscroll on mobile */
  overscroll-behavior:none;
  -webkit-overflow-scrolling:touch}

/* ── App shell ───────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── Top bar ─────────────────────────────────────────────────────────── */
#topbar{
  height:52px;background:var(--bar);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:50;
  transition:background .2s}
.brand{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-.4px;white-space:nowrap}
.book-name{font-size:12px;color:var(--text2);max-width:160px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:11px;font-weight:600;color:var(--accent);
  background:rgba(123,110,246,.15);border-radius:5px;padding:2px 7px;white-space:nowrap}
.spacer{flex:1}
.pg-label{font-size:11px;color:var(--text3);white-space:nowrap}

/* ── Icon buttons ────────────────────────────────────────────────────── */
.zoom-group{display:flex;align-items:center;gap:3px}
.icon-btn{
  width:38px;height:38px;border-radius:8px;
  border:1px solid var(--border);background:var(--btn-bg);
  color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;transition:background .12s,color .12s;flex-shrink:0;
  /* Large touch target */
  min-width:38px}
.icon-btn:hover:not(:disabled){background:var(--btn-hover);color:var(--text2)}
.icon-btn:disabled{opacity:.22;cursor:not-allowed}
.icon-btn.active{background:rgba(123,110,246,.15)!important;
  border-color:rgba(123,110,246,.35)!important;color:var(--accent)!important}
.zoom-val{height:38px;min-width:52px;padding:0 6px;
  background:var(--btn-bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .12s}
.zoom-val:hover{background:var(--btn-hover);color:var(--text1)}
.topbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* Back-to-shelf button */
.btn-back-shelf{
  display:inline-flex;align-items:center;gap:5px;
  height:32px;padding:0 10px;border-radius:7px;
  border:1px solid var(--border);background:var(--btn-bg);
  color:var(--text2);font-size:12px;font-weight:600;font-family:inherit;
  cursor:pointer;text-decoration:none;white-space:nowrap;
  transition:background .12s,color .12s,border-color .15s;flex-shrink:0}
.btn-back-shelf:hover{background:var(--btn-hover);color:var(--accent);border-color:rgba(123,110,246,.4)}
@media(max-width:767px){.btn-back-shelf span{display:none}}

/* Theme toggle icon colours */
[data-theme=dark]  #btn-theme:hover{color:#F5C842!important}
[data-theme=light] #btn-theme:hover{color:var(--accent)!important}

/* ── Mobile topbar: hide non-essential items ─────────────────────────── */
@media(max-width:767px){
  .book-name,.badge,.zoom-group,.topbar-sep:not(.keep),.pg-label{display:none!important}
  #topbar{padding:0 10px;gap:8px;height:48px}
  .icon-btn{width:42px;height:42px;border-radius:10px}
}

/* ── Mobile menu drawer ──────────────────────────────────────────────── */
#mob-drawer{
  display:none;
  background:var(--bar);border-bottom:1px solid var(--border);
  padding:10px 12px 12px;flex-direction:column;gap:10px;
  flex-shrink:0;z-index:49;
  animation:slideDown .15s ease}
#mob-drawer.open{display:flex}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.mob-row{display:flex;gap:8px;flex-wrap:wrap}
.mob-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;min-height:44px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:9px;color:var(--text2);
  font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:background .12s;white-space:nowrap}
.mob-btn:hover,.mob-btn.active{background:rgba(123,110,246,.15);border-color:rgba(123,110,246,.35);color:var(--accent)}
.mob-btn:disabled{opacity:.35;cursor:not-allowed}
.mob-zoom-row{display:flex;align-items:center;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;align-self:flex-start}
.mob-zoom-btn{
  width:48px;height:42px;background:transparent;border:none;
  color:var(--text2);font-size:22px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s}
.mob-zoom-btn:hover:not(:disabled){background:rgba(123,110,246,.15);color:var(--accent)}
.mob-zoom-btn:disabled{opacity:.25;cursor:not-allowed}
.mob-zoom-val{
  min-width:56px;text-align:center;font-size:13px;font-weight:600;
  color:var(--text2);cursor:pointer;padding:0 4px;
  border-left:1px solid var(--border);border-right:1px solid var(--border)}
@media(min-width:768px){#mob-drawer{display:none!important}}

/* ── Main area ───────────────────────────────────────────────────────── */
#main-area{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── Thumbnail panel ─────────────────────────────────────────────────── */
#thumb-panel{width:148px;flex-shrink:0;background:var(--bar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .2s ease,background .2s;z-index:10}
#thumb-panel.hidden{width:0;overflow:hidden}
#thumb-head{padding:10px 12px 8px;font-size:10px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
  border-bottom:1px solid var(--border);flex-shrink:0}
#thumb-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 8px 16px}
#thumb-list::-webkit-scrollbar{width:3px}
#thumb-list::-webkit-scrollbar-thumb{background:rgba(128,128,128,.2);border-radius:2px}
.thumb-item{cursor:pointer;border-radius:5px;overflow:hidden;margin-bottom:8px;
  border:2px solid transparent;transition:border-color .15s,transform .1s;position:relative}
.thumb-item:hover{transform:scale(1.02)}
.thumb-item.active{border-color:var(--accent)}
.thumb-item img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;background:transparent}
.thumb-stage{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:transparent}
.thumb-stage > img{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:auto;object-fit:cover}
.thumb-num{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);font-size:9px;color:rgba(255,255,255,.6);
  text-align:center;padding:2px 0}
.thumb-item.active .thumb-num{background:rgba(123,110,246,.6);color:#fff}
/* Hide thumb panel on mobile — use space for book */
@media(max-width:767px){#thumb-panel,#thumb-panel.open{width:0!important;overflow:hidden}}

/* ── Stage ───────────────────────────────────────────────────────────── */
#stage{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:20px 56px;
  background:var(--stage);transition:background .2s}
#stage::before{content:'';position:absolute;top:-10%;left:50%;transform:translateX(-50%);
  width:70%;height:60%;background:radial-gradient(ellipse,rgba(123,110,246,.07) 0%,transparent 70%);
  pointer-events:none}
@media(max-width:767px){
  #stage{padding:12px 44px}
  .nav-btn{width:36px;height:62px}
  #nav-left{left:3px}
  #nav-right{right:3px}}

/* book-scene: flex-column, never scaled */
#book-scene{display:flex;flex-direction:column;align-items:center}
/* zoom-wrapper: receives transform:scale() */
#zoom-wrapper{transition:transform .2s ease;transform-origin:center bottom;position:relative}
/* book-wrapper */
#book-wrapper{position:relative;z-index:5}
/* Shadow outside scale transform */
#book-shadow{height:30px;
  background:radial-gradient(ellipse,rgba(0,0,0,.6) 0%,transparent 70%);
  pointer-events:none;transition:margin-top .2s ease,width .2s ease}

/* Pan / swipe hint */
#pan-hint{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  z-index:25;pointer-events:none;
  display:none;align-items:center;gap:5px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  border-radius:8px 8px 0 0;padding:4px 12px;
  font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap}
#pan-hint.visible{display:flex}
[data-theme=light] #pan-hint{background:rgba(0,0,0,.14);color:rgba(0,0,0,.4)}

/* ── Nav arrows ──────────────────────────────────────────────────────── */
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:76px;border-radius:10px;
  border:1px solid var(--border);background:var(--btn-bg);
  color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:30;transition:background .15s,color .15s;padding:0}
.nav-btn:hover:not(:disabled){background:rgba(123,110,246,.15);color:var(--accent)}
.nav-btn:disabled{opacity:.2;cursor:not-allowed;pointer-events:none}
#nav-left{left:8px}
#nav-right{right:8px}

/* ── Page / StPageFlip ───────────────────────────────────────────────── */
.stf__page{background:#F9F9FB;overflow:hidden}
.page-inner{width:100%;height:100%;position:relative;overflow:hidden;background:#F9F9FB}
.page-inner img.page-img{width:100%;height:100%;object-fit:cover;display:block;
  pointer-events:none;user-select:none;-webkit-user-drag:none}

/* ── Widgets ─────────────────────────────────────────────────────────── */
.widget-wrap{position:absolute;overflow:hidden;pointer-events:auto;z-index:10}
/* Emphasis effects (pulse/bounce/shake/float/spin) move/scale/rotate the widget
   past its box; allow overflow so the image isn't cropped by its own frame. */
.widget-wrap.widget-wrap--emphasis{overflow:visible}

@keyframes w-fadein {from{opacity:0}to{opacity:1}}
@keyframes w-slideup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes w-pulse  {0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes w-link-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.5)}
  50%    {box-shadow:0 0 0 6px rgba(59,130,246,0)}}
.wanim-none{}
.wanim-fadeIn {animation:w-fadein  .6s ease forwards}
.wanim-slideUp{animation:w-slideup .5s ease forwards}
.wanim-pulse  {animation:w-pulse  1.5s ease infinite}

/* Shared widget animation keyframes (identical spec to the workspace editor) */
.widget-anim-inner{width:100%;height:100%;transform-origin:center center}
@keyframes wk-fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes wk-slideUp   {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes wk-slideDown {from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes wk-slideLeft {from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes wk-slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes wk-zoomIn    {from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes wk-zoomOut   {from{opacity:0;transform:scale(1.15)}to{opacity:1;transform:scale(1)}}
@keyframes wk-rotateIn  {from{opacity:0;transform:rotate(-8deg) scale(.9)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes wk-flipX     {from{opacity:0;transform:perspective(600px) rotateX(70deg)}to{opacity:1;transform:perspective(600px) rotateX(0)}}
@keyframes wk-blurIn    {from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}
@keyframes wk-pulse     {0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes wk-bounce    {0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wk-shake     {0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes wk-float     {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wk-spin      {from{transform:rotate(0)}to{transform:rotate(360deg)}}

.widget-link-btn{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(59,130,246,.2);border:1.5px solid rgba(59,130,246,.5);
  border-radius:4px;color:#93C5FD;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  animation:w-link-pulse 2s ease-in-out infinite}
.widget-link-btn:hover{background:rgba(59,130,246,.35)}
.widget-play-btn{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:rgba(123,110,246,.2);border:1.5px solid rgba(123,110,246,.4);
  border-radius:4px;color:#C0B8FA;cursor:pointer;font-family:inherit}
.widget-play-btn:hover{background:rgba(123,110,246,.35)}
.widget-iframe{width:100%;height:100%;border:none;display:block}
.widget-video{width:100%;height:100%;display:block}
.widget-audio-wrap{width:100%;height:100%;display:flex;align-items:center;gap:6px;padding:4px 6px;
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:4px}
.widget-audio-wrap audio{flex:1;min-width:0}

/* ── Bottom bar ──────────────────────────────────────────────────────── */
#bottombar{
  height:60px;background:var(--bar);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;z-index:50;
  transition:background .2s}
#progress-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
#progress-track{height:5px;background:rgba(128,128,128,.15);
  border-radius:2px;cursor:pointer;position:relative}
#progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .25s ease}
#progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;background:var(--accent);border-radius:50%;
  border:2px solid var(--bg);pointer-events:none;transition:left .25s ease}
#progress-labels{display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--text3)}
#swipe-hint{display:none;align-items:center;gap:3px;font-size:10px;color:var(--text3);opacity:.7}
#swipe-hint.visible{display:flex}
@media(max-width:767px){#swipe-hint{display:flex}}
.bar-btn{width:42px;height:42px;border-radius:9px;
  border:1px solid var(--border);background:var(--btn-bg);
  color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;transition:background .12s,color .12s;flex-shrink:0}
.bar-btn:hover:not(:disabled){background:var(--btn-hover);color:var(--text2)}
.bar-btn:disabled{opacity:.22;cursor:not-allowed}

/* ── Loader ──────────────────────────────────────────────────────────── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:34px;height:34px;border:3px solid rgba(123,110,246,.2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-size:14px;color:var(--text2)}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Loading book…</p></div>

<div id="app" style="display:none">

  <!-- Top bar -->
  <div id="topbar">
    <span class="brand-name">เบญจมราชาลัย 2568</span>
    <span class="book-name" id="lbl-name"></span>
    <span class="badge"     id="lbl-pages"></span>
    <span class="spacer"></span>

    <!-- Desktop: zoom controls -->
    <div class="zoom-group" id="zoom-group-desktop">
      <button class="icon-btn" id="btn-zoom-out" title="Zoom out (Ctrl-)">
        <svg viewBox="0 0 16 16" fill="currentColor" width="13" height="13">
          <path fill-rule="evenodd" d="M7 2a5 5 0 100 10A5 5 0 007 2zM0 7a7 7 0 1112.45 4.39l3.08 3.08-1.42 1.42L11.03 11.8A7 7 0 010 7zm3.5-.5h7v1h-7V6.5z"/>
        </svg>
      </button>
      <button class="zoom-val" id="btn-zoom-reset" title="Reset zoom (Ctrl+0)">100%</button>
      <button class="icon-btn" id="btn-zoom-in" title="Zoom in (Ctrl+)">
        <svg viewBox="0 0 16 16" fill="currentColor" width="13" height="13">
          <path fill-rule="evenodd" d="M7 2a5 5 0 100 10A5 5 0 007 2zM0 7a7 7 0 1112.45 4.39l3.08 3.08-1.42 1.42L11.03 11.8A7 7 0 010 7zm3.5-.5h3V3.5h1V6.5H11v1H8.5V10h-1V7.5H4.5v-1z"/>
        </svg>
      </button>
    </div>

    <div class="topbar-sep"></div>

    <!-- Desktop: thumbnail toggle -->
    <button class="icon-btn" id="btn-thumb" title="Toggle thumbnails">
      <svg viewBox="0 0 16 16" fill="currentColor" width="13" height="13">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>

    <!-- Mobile: hamburger -->
    <button class="icon-btn" id="btn-mob-menu" title="Menu" style="display:none">
      <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15">
        <path fill-rule="evenodd" d="M1 2.5h14v1.5H1V2.5zm0 5h14V9H1V7.5zm0 5h14V14H1v-1.5z"/>
      </svg>
    </button>

    <!-- Dark/Light toggle — always visible -->
    <button class="icon-btn" id="btn-theme" title="Toggle dark/light mode">
      <svg id="icon-sun" viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
        <path d="M8 12A4 4 0 1 1 8 4a4 4 0 0 1 0 8zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM8 1.5a.75.75 0 0 1 .75.75v1a.75.75 0 0 1-1.5 0v-1A.75.75 0 0 1 8 1.5zM8 12a.75.75 0 0 1 .75.75v1a.75.75 0 0 1-1.5 0v-1A.75.75 0 0 1 8 12zM1.5 8a.75.75 0 0 1 .75-.75h1a.75.75 0 0 1 0 1.5h-1A.75.75 0 0 1 1.5 8zM12 8a.75.75 0 0 1 .75-.75h1a.75.75 0 0 1 0 1.5h-1A.75.75 0 0 1 12 8zM3.52 3.52a.75.75 0 0 1 1.06 0l.71.71a.75.75 0 0 1-1.06 1.06l-.71-.71a.75.75 0 0 1 0-1.06zM10.71 10.71a.75.75 0 0 1 1.06 0l.71.71a.75.75 0 0 1-1.06 1.06l-.71-.71a.75.75 0 0 1 0-1.06zM3.52 12.48a.75.75 0 0 1 0-1.06l.71-.71a.75.75 0 1 1 1.06 1.06l-.71.71a.75.75 0 0 1-1.06 0zM10.71 5.29a.75.75 0 0 1 0-1.06l.71-.71a.75.75 0 1 1 1.06 1.06l-.71.71a.75.75 0 0 1-1.06 0z"/>
      </svg>
      <svg id="icon-moon" viewBox="0 0 16 16" fill="currentColor" width="14" height="14" style="display:none">
        <path d="M6 .278a.77.77 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
      </svg>
    </button>

    <div class="topbar-sep keep"></div>
    <span class="pg-label" id="lbl-pg"></span>
    <a href="../index.html" class="btn-back-shelf" title="Back to Shelf">
        <svg viewBox="0 0 16 16" fill="currentColor" width="13" height="13"><path d="M9.354 1.646a.5.5 0 0 1 0 .708L5.707 6H14.5a.5.5 0 0 1 0 1H5.707l3.647 3.646a.5.5 0 0 1-.708.708l-4.5-4.5a.5.5 0 0 1 0-.708l4.5-4.5a.5.5 0 0 1 .708 0z"/></svg>
        <span>Shelf</span>
      </a>
  </div>

  <!-- Mobile drawer (hidden on desktop) -->
  <div id="mob-drawer">
    <div class="mob-row">
      <button class="mob-btn" id="mob-btn-thumb">
        <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
        <span>Pages</span>
      </button>
    </div>

// ── Constants ─────────────────────────────────────────────────────────────────
const TOTAL        = PAGE_IMAGES.length;
const ZOOM_STEPS   = [0.5, 0.65, 0.8, 1.0, 1.2, 1.5, 1.8, 2.2];
const ZOOM_DEFAULT = 3;
const MOB_BREAK    = 768;   // px — matches PaperOSReader.tsx
const MIN_SWIPE_X  = 50;    // px horizontal threshold
const MAX_SWIPE_Y  = 80;    // px vertical — above this = scroll, not swipe

// ── Responsive page size (recalculated on resize/orientation) ─────────────────
function computePageSize(){
  const w = window.innerWidth;
  if(w < MOB_BREAK){
    // Single-page portrait: fill available width minus nav arrows (44px each side)
    const usable = w - 24 - 88;  // padding + arrows
    const pw = Math.max(220, Math.min(usable, 340));
    return { pageW: pw, pageH: Math.round(pw * (537/380)), isMobile: true };
  }
  return { pageW: 380, pageH: 537, isMobile: false };
}

// ── State ─────────────────────────────────────────────────────────────────────
let pageFlip     = null;
let currentIdx   = 0;
let savedPage    = 0;   // page to restore after remount
let zoomIdx      = ZOOM_DEFAULT;
let thumbOpen    = false;
let isDark       = true;
let mobDrawerOpen= false;
let { pageW, pageH, isMobile } = computePageSize();

// Pan state
let panX = 0, panY = 0;
let panDragging = false;
let panStartX = 0, panStartY = 0, panOX = 0, panOY = 0;

// Touch swipe state
let touchStartX = 0, touchStartY = 0;

// ── Helpers ───────────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }

function buildPageLabel(idx){
  if(isMobile)         return (idx+1) + ' / ' + TOTAL;
  if(idx === 0)        return 'Front Cover';
  if(idx >= TOTAL - 1) return 'Back Cover';
  return (idx+1) + ' – ' + Math.min(idx+2, TOTAL);
}

function getYouTubeId(url){
  try{
    const u = new URL(url);
    return u.searchParams.get('v') || u.pathname.split('/').pop() || '';
  }catch{ return ''; }
}

// ── Widget animation engine (mirrors the workspace editor) ────────────────────
var WK_EMPHASIS = ['pulse','bounce','shake','float','spin'];
function widgetAnimStyle(effect, mode, dur, repeat){
  if(!effect || effect === 'none') return '';
  var d = (dur && dur > 0) ? dur : 0.6;
  var name = 'wk-' + effect;
  if(mode === 'loop'){
    return WK_EMPHASIS.indexOf(effect) >= 0
      ? name + ' ' + d + 's ease-in-out infinite'
      : name + ' ' + d + 's ease-in-out infinite alternate';
  }
  // repeat: undefined/1 = play once (default), 0 = infinite, >1 = N times
  var rep = (typeof repeat === 'number') ? repeat : 1;
  var iterCount = rep === 0 ? 'infinite' : String(rep);
  if(mode === 'out') return name + ' ' + d + 's ease both reverse ' + iterCount;
  return name + ' ' + d + 's ease both ' + iterCount;
}
function triggerWidgetAnim(inner, phase){
  var effect = inner.dataset.wanim;
  if(!effect || effect === 'none') return;
  var mode   = inner.dataset.wmode || 'in';
  var dur    = parseFloat(inner.dataset.wdur) || 0.6;
  var repeat = inner.dataset.wrepeat !== undefined ? parseInt(inner.dataset.wrepeat, 10) : 1;
  if(isNaN(repeat)) repeat = 1;
  if(phase === 'enter'){
    if(mode === 'in' || mode === 'loop'){
      inner.style.animation = 'none';
      void inner.offsetWidth;                 // force reflow → restart
      inner.style.animation = widgetAnimStyle(effect, mode, dur, repeat);
    } else {
      inner.style.animation = '';             // 'out': stay visible until exit
    }
  } else { // 'exit'
    if(mode === 'out'){
      inner.style.animation = 'none';
      void inner.offsetWidth;
      inner.style.animation = widgetAnimStyle(effect, 'out', dur, repeat);
    } else if(mode === 'loop'){
      inner.style.animation = '';             // stop the loop when off-page
    }
  }
}
function activePagesFor(idx){
  return isMobile ? [idx] : [idx, idx + 1];
}
var prevActivePages = [];
function animatePages(idx){
  var next = activePagesFor(idx).filter(function(i){ return i >= 0 && i < TOTAL; });
  // Exit widgets on pages that are no longer active
  prevActivePages.filter(function(i){ return next.indexOf(i) < 0; }).forEach(function(i){
    document.querySelectorAll('.page-inner[data-page-idx="' + i + '"] .widget-anim-inner')
      .forEach(function(el){ triggerWidgetAnim(el, 'exit'); });
  });
  // Enter widgets on pages that just became active
  next.filter(function(i){ return prevActivePages.indexOf(i) < 0; }).forEach(function(i){
    document.querySelectorAll('.page-inner[data-page-idx="' + i + '"] .widget-anim-inner')
      .forEach(function(el){ triggerWidgetAnim(el, 'enter'); });
  });
  prevActivePages = next;
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(){
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  $('icon-sun').style.display  = isDark ? 'block' : 'none';
  $('icon-moon').style.display = isDark ? 'none'  : 'block';
}
function toggleTheme(){ isDark = !isDark; applyTheme(); }

// ── Mobile / Desktop layout ───────────────────────────────────────────────────
function applyResponsive(){
  const mob = window.innerWidth < MOB_BREAK;
  // Show/hide topbar controls
  $('btn-thumb').style.display       = mob ? 'none'  : 'flex';
  $('btn-mob-menu').style.display    = mob ? 'flex'  : 'none';
  $('zoom-group-desktop').style.display = mob ? 'none' : 'flex';

  // Swipe hint in bottombar
  const sh = $('swipe-hint');
  if(sh) sh.classList.toggle('visible', mob && ZOOM_STEPS[zoomIdx] <= 1);

  updatePanHint();
}

// ── Zoom & shadow ─────────────────────────────────────────────────────────────
function updateShadow(){
  const z  = ZOOM_STEPS[zoomIdx];
  const mult = isMobile ? 1 : 2;
  $('book-shadow').style.width     = (pageW * mult * z * 0.8) + 'px';
  $('book-shadow').style.marginTop = (pageH * (z - 1) / 2 + 6) + 'px';
}

function applyZoom(){
  const z = ZOOM_STEPS[zoomIdx];
  $('zoom-wrapper').style.transform = 'scale(' + z + ')';
  const pct = Math.round(z * 100) + '%';
  $('btn-zoom-reset').textContent = pct;
  const mv = $('mob-zoom-val');
  if(mv) mv.textContent = pct;
  $('btn-zoom-out').disabled = zoomIdx === 0;
  $('btn-zoom-in').disabled  = zoomIdx === ZOOM_STEPS.length - 1;
  const mbo = $('mob-btn-zoom-out'), mbi = $('mob-btn-zoom-in');
  if(mbo) mbo.disabled = zoomIdx === 0;
  if(mbi) mbi.disabled = zoomIdx === ZOOM_STEPS.length - 1;
  updateShadow();
  updatePanHint();
  applyResponsive();
  if(z <= 1){ panX = panY = 0; applyPan(); }
}

function zoomIn () { if(zoomIdx < ZOOM_STEPS.length - 1){ zoomIdx++; applyZoom(); } }
function zoomOut() { if(zoomIdx > 0)                    { zoomIdx--; applyZoom(); } }
function zoomReset(){ zoomIdx = ZOOM_DEFAULT; panX = panY = 0; applyZoom(); applyPan(); }

// ── Pan ───────────────────────────────────────────────────────────────────────
function applyPan(){
  const z = ZOOM_STEPS[zoomIdx];
  $('book-scene').style.transform = z <= 1 ? '' : 'translate(' + panX + 'px,' + panY + 'px)';
}

function updatePanHint(){
  const z   = ZOOM_STEPS[zoomIdx];
  const mob = window.innerWidth < MOB_BREAK;
  const hint = $('pan-hint');
  const txt  = $('pan-hint-text');
  if(z > 1){
    hint.classList.add('visible');
    if(txt) txt.textContent = mob
      ? 'Pinch zoom active — swipe to flip disabled'
      : 'Drag to pan · Ctrl+scroll to zoom';
  } else {
    hint.classList.remove('visible');
  }
  $('stage').style.cursor = z > 1 ? 'grab' : '';
}

function initPan(){
  const stage = $('stage');

  stage.addEventListener('pointerdown', function(e){
    if(ZOOM_STEPS[zoomIdx] <= 1) return;
    const t = e.target;
    if(t.closest('button,input,a,.widget-wrap,.nav-btn')) return;
    panDragging = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOX = panX; panOY = panY;
    stage.setPointerCapture(e.pointerId);
    stage.style.cursor = 'grabbing';
    e.preventDefault();
  });

  stage.addEventListener('pointermove', function(e){
    if(!panDragging) return;
    panX = panOX + (e.clientX - panStartX);
    panY = panOY + (e.clientY - panStartY);
    applyPan();
  });

  stage.addEventListener('pointerup',     function(){ panDragging = false; stage.style.cursor = ZOOM_STEPS[zoomIdx] > 1 ? 'grab' : ''; });
  stage.addEventListener('pointercancel', function(){ panDragging = false; });

  // Ctrl+scroll to zoom
  stage.addEventListener('wheel', function(e){
    if(e.ctrlKey || e.metaKey){ e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); }
  }, { passive: false });
}

// ── Touch Swipe — flip pages on mobile, disabled when zoomed in ───────────────
// Registered on stage with passive listeners to not block native scroll.
// Suppressed when zoom > 1 so pan/pinch takes priority.
function initSwipe(){
  const stage = $('stage');

  stage.addEventListener('touchstart', function(e){
    if(ZOOM_STEPS[zoomIdx] > 1) return;   // pan mode — don't hijack
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  stage.addEventListener('touchend', function(e){
    if(ZOOM_STEPS[zoomIdx] > 1 || !pageFlip) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    // Reject vertical-dominant gestures (scrolling)
    if(Math.abs(dx) < MIN_SWIPE_X || dy > MAX_SWIPE_Y) return;
    if(dx < 0) pageFlip.flipNext();   // swipe left  → next
    else       pageFlip.flipPrev();   // swipe right → prev
  }, { passive: true });
}

// ── Thumbnail panel ───────────────────────────────────────────────────────────
// Thumbnails composite the page background image WITH the widgets placed on
// that page (image widgets show their picture; media/link widgets show a small
// type chip), so the thumbnail matches what the reader actually sees.
function buildThumbWidgetHtml(pageIdx){
  return (BOOK_CONFIG.widgets || [])
    .filter(function(w){ return w.pageIndex === pageIdx; })
    .map(function(w){
      var pos = 'position:absolute;left:'+w.x+'%;top:'+w.y+'%;'+
        'width:'+(w.width!=null?w.width:20)+'%;height:'+(w.height!=null?w.height:15)+'%;'+
        'opacity:'+((w.opacity!=null?w.opacity:100)/100)+';overflow:hidden;';
      // Image widgets are real, visible page content → show the picture with a
      // transparent letterbox (object-fit:contain) so the page art shows through.
      // Wrapped in a <div> so the global ".thumb-stage > img" rule (which forces
      // inset:0 / object-fit:cover for the page image) can't hijack its position.
      if(w.type === 'image' && w.url){
        return '<div style="'+pos+'">'+
          '<img src="'+w.url+'" alt="" style="width:100%;height:100%;object-fit:contain;display:block;background:transparent;"/>'+
        '</div>';
      }
      // link / audio / youtube / video are interactive overlays that are NOT
      // painted onto the page in the reader. Filling the whole widget box with a
      // solid colour buried the page under dark blocks (e.g. a Contents page with
      // many links). Show a tiny corner chip instead: it still hints at an
      // interactive zone while keeping the thumbnail faithful to the page.
      var dot =
        w.type === 'link'  ? 'rgba(59,130,246,.9)' :
        w.type === 'audio' ? 'rgba(16,185,129,.9)' :
                             'rgba(123,110,246,.9)';
      return '<span style="position:absolute;left:'+w.x+'%;top:'+w.y+'%;'+
        'width:7px;height:7px;margin:1px;border-radius:50%;'+
        'background:'+dot+';box-shadow:0 0 0 1.5px rgba(255,255,255,.7);"></span>';
    })
    .join('');
}

function buildThumbnails(){
  const list = $('thumb-list');
  list.innerHTML = '';
  PAGE_IMAGES.forEach((src, idx) => {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (idx === 0 ? ' active' : '');
    item.dataset.idx = idx;
    // Composite stage: page image as background + widget overlays on top
    const stage = document.createElement('div');
    stage.className = 'thumb-stage';
    stage.innerHTML =
      '<img src="'+src+'" alt="p.'+(idx+1)+'" loading="lazy"/>' +
      buildThumbWidgetHtml(idx);
    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = idx + 1;
    item.appendChild(stage); item.appendChild(num);
    item.addEventListener('click', () => { if(pageFlip) pageFlip.flip(idx); });
    list.appendChild(item);
  });
}

function syncThumbnails(idx){
  document.querySelectorAll('.thumb-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
  const active = $('thumb-list').querySelector('.thumb-item.active');
  if(active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function toggleThumbPanel(){
  thumbOpen = !thumbOpen;
  $('thumb-panel').classList.toggle('hidden', !thumbOpen);
  $('btn-thumb').classList.toggle('active', thumbOpen);
  const mbt = $('mob-btn-thumb');
  if(mbt) mbt.classList.toggle('active', thumbOpen);
}

// ── Build page element ────────────────────────────────────────────────────────
function buildPageEl(pageIdx){
  const outer = document.createElement('div');
  outer.className = 'page-inner';
  outer.dataset.pageIdx = pageIdx;
  const img = document.createElement('img');
  img.className = 'page-img';
  img.src = PAGE_IMAGES[pageIdx];
  img.alt = 'Page ' + (pageIdx+1);
  outer.appendChild(img);

  (BOOK_CONFIG.widgets || []).filter(w => w.pageIndex === pageIdx).forEach(w => {
    const wrap = document.createElement('div');
    wrap.className = 'widget-wrap';
    // Emphasis effects animate beyond the widget box → let the frame overflow so
    // the moving/scaling/rotating image isn't cropped (see .widget-wrap--emphasis).
    if(WK_EMPHASIS.indexOf(w.animation) >= 0) wrap.classList.add('widget-wrap--emphasis');
    wrap.style.cssText =
      'left:'+w.x+'%;top:'+w.y+'%;'+
      'width:'+(w.width??20)+'%;height:'+(w.height??15)+'%;'+
      'opacity:'+((w.opacity??100)/100);
    wrap.dataset.widgetType = w.type;
    wrap.dataset.widgetUrl  = w.url || '';
    wrap.dataset.targetPage = String(w.targetPage ?? 0);

    const inner = document.createElement('div');
    inner.style.cssText = 'width:100%;height:100%';
    inner.className = 'widget-anim-inner';
    inner.dataset.wanim   = w.animation || 'none';
    inner.dataset.wmode   = w.animationMode || 'in';
    inner.dataset.wdur    = String(w.animationDuration || 0.6);
    inner.dataset.wrepeat = String(typeof w.animationRepeat === 'number' ? w.animationRepeat : 1);

    if(w.type === 'link'){
      const btn = document.createElement('button');
      btn.className = 'widget-link-btn';
      btn.dataset.action = 'link';
      btn.textContent = w.label || ('p.' + ((w.targetPage??0)+1));
      inner.appendChild(btn);
    } else if(w.type === 'image'){
      const wImg = document.createElement('img');
      wImg.src = w.url; wImg.alt = w.label || '';
      wImg.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block';
      inner.appendChild(wImg);
    } else if(w.type === 'youtube' || w.type === 'video'){
      const btn = document.createElement('button');
      btn.className = 'widget-play-btn';
      btn.dataset.action = 'play';
      btn.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>';
      inner.appendChild(btn);
    } else if(w.type === 'audio'){
      const aw = document.createElement('div');
      aw.className = 'widget-audio-wrap';
      const audio = document.createElement('audio');
      audio.src = w.url; audio.controls = true;
      aw.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.7"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
      aw.appendChild(audio);
      inner.appendChild(aw);
    }

    wrap.appendChild(inner);
    outer.appendChild(wrap);
  });
  return outer;
}

// ── Update UI ─────────────────────────────────────────────────────────────────
function updateUI(idx){
  currentIdx = idx;
  const pct = TOTAL > 1 ? (idx / (TOTAL-1)) * 100 : 0;
  $('progress-fill').style.width = pct + '%';
  $('progress-thumb').style.left = pct + '%';
  $('lbl-pct').textContent    = Math.round(pct) + '%';
  $('lbl-pg').textContent     = (idx+1) + ' / ' + TOTAL;
  $('lbl-spread').textContent = buildPageLabel(idx);
  $('nav-left').disabled  = idx <= 0;
  $('nav-right').disabled = idx >= TOTAL - 1;
  $('btn-prev').disabled  = idx <= 0;
  $('btn-next').disabled  = idx >= TOTAL - 1;
  syncThumbnails(idx);
  animatePages(idx);
}

// ── Widget event delegation ───────────────────────────────────────────────────
document.addEventListener('click', function(e){
  const linkBtn = e.target.closest('[data-action="link"]');
  if(linkBtn){
    e.stopPropagation();
    const tgt = parseInt(linkBtn.closest('.widget-wrap').dataset.targetPage, 10) || 0;
    pageFlip && pageFlip.flip(tgt);
    return;
  }
  const playBtn = e.target.closest('[data-action="play"]');
  if(playBtn){
    e.stopPropagation();
    const wrap = playBtn.closest('.widget-wrap');
    if(!wrap) return;
    const type = wrap.dataset.widgetType;
    const url  = wrap.dataset.widgetUrl;
    if(type === 'youtube'){
      const iframe = document.createElement('iframe');
      iframe.className = 'widget-iframe';
      iframe.src = 'https://www.youtube.com/embed/' + getYouTubeId(url) + '?autoplay=1';
      iframe.allow = 'autoplay; encrypted-media';
      iframe.allowFullscreen = true;
      playBtn.replaceWith(iframe);
    } else if(type === 'video'){
      const video = document.createElement('video');
      video.className = 'widget-video';
      video.src = url; video.controls = true; video.autoplay = true;
      playBtn.replaceWith(video);
    }
  }
});

// ── Init / Rebuild flipbook ───────────────────────────────────────────────────
// Called on first load AND when orientation changes require a new mode.
function initFlipBook(restorePage){
  const wrapper = $('book-wrapper');
  wrapper.innerHTML = '';   // clear on rebuild
  prevActivePages = [];     // DOM rebuilt → re-evaluate which widgets are on-screen

  PAGE_IMAGES.forEach((_, idx) => wrapper.appendChild(buildPageEl(idx)));

  const PF = (window.St && window.St.PageFlip) || window.PageFlip;
  if(!PF){ alert('PageFlip engine not loaded. Please re-export the ZIP.'); return; }

  if(pageFlip){ try{ pageFlip.destroy(); } catch(e){} }

  pageFlip = new PF(wrapper, {
    width:  pageW, height: pageH, size: 'fixed',
    minWidth: pageW, maxWidth: pageW, minHeight: pageH, maxHeight: pageH,
    drawShadow: true, flippingTime: 700,
    usePortrait: isMobile,   // ← single-page on mobile, double on desktop
    startPage: 0, showCover: true, mobileScrollSupport: true,
    useMouseEvents: true, swipeDistance: 30, maxShadowOpacity: 0.55,
    showPageCorners: !isMobile, startZIndex: 10, autoSize: false,
  });

  pageFlip.loadFromHTML(wrapper.querySelectorAll('.page-inner'));
  pageFlip.on('flip', e => updateUI(e.data));

  // Restore page after remount (orientation change)
  if(restorePage > 0){
    setTimeout(() => { try{ pageFlip.flip(restorePage); }catch(e){} }, 80);
  }
}

// ── Orientation / Resize handling (Adaptive Flip Mode) ───────────────────────
// Re-initialises the flipbook when breakpoint crosses 768px.
// Saves currentIdx before rebuilding so we can restore position.
let prevMob = isMobile;
let resizeTimer = null;

function onResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){
    const sizes = computePageSize();
    const nowMob = sizes.isMobile;

    applyResponsive();

    // Only rebuild if layout mode flipped (single ↔ double)
    if(nowMob !== prevMob){
      savedPage = currentIdx;   // save before remount
      prevMob   = nowMob;
      pageW     = sizes.pageW;
      pageH     = sizes.pageH;
      isMobile  = sizes.isMobile;
      initFlipBook(savedPage);
      applyZoom();
      updateUI(savedPage);
    }
  }, 150);
}

window.addEventListener('resize',            onResize);
window.addEventListener('orientationchange', onResize);

// ── First load ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  $('lbl-name').textContent  = BOOK_CONFIG.name || 'Book';
  $('lbl-pages').textContent = TOTAL + ' pages';

  applyTheme();
  buildThumbnails();
  initFlipBook(0);

  // Wire desktop controls
  $('nav-left').addEventListener('click',       () => pageFlip && pageFlip.flipPrev());
  $('nav-right').addEventListener('click',      () => pageFlip && pageFlip.flipNext());
  $('btn-prev').addEventListener('click',       () => pageFlip && pageFlip.flipPrev());
  $('btn-next').addEventListener('click',       () => pageFlip && pageFlip.flipNext());
  $('btn-zoom-in').addEventListener('click',    zoomIn);
  $('btn-zoom-out').addEventListener('click',   zoomOut);
  $('btn-zoom-reset').addEventListener('click', zoomReset);
  $('btn-thumb').addEventListener('click',      toggleThumbPanel);
  $('btn-theme').addEventListener('click',      toggleTheme);

  // Wire mobile menu
  $('btn-mob-menu').addEventListener('click', function(){
    mobDrawerOpen = !mobDrawerOpen;
    $('mob-drawer').classList.toggle('open', mobDrawerOpen);
    this.classList.toggle('active', mobDrawerOpen);
  });
  const mbt = $('mob-btn-thumb'), mbo = $('mob-btn-zoom-out'),
        mbi = $('mob-btn-zoom-in'), mbr = $('mob-zoom-val');
  if(mbt) mbt.addEventListener('click', () => { toggleThumbPanel(); });
  if(mbo) mbo.addEventListener('click', zoomOut);
  if(mbi) mbi.addEventListener('click', zoomIn);
  if(mbr) mbr.addEventListener('click', zoomReset);

  // Progress seek
  $('progress-track').addEventListener('click', function(e){
    const r = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
    pageFlip && pageFlip.flip(Math.round(r * (TOTAL-1)));
  });

  // Keyboard
  document.addEventListener('keydown', function(e){
    if(e.target.tagName === 'INPUT') return;
    if(e.key === 'ArrowRight' || e.key === 'PageDown') pageFlip && pageFlip.flipNext();
    if(e.key === 'ArrowLeft'  || e.key === 'PageUp')   pageFlip && pageFlip.flipPrev();
    if(e.key === 'Home') pageFlip && pageFlip.flip(0);
    if(e.key === 'End')  pageFlip && pageFlip.flip(TOTAL-1);
    if((e.ctrlKey||e.metaKey) && (e.key==='='||e.key==='+')){ e.preventDefault(); zoomIn(); }
    if((e.ctrlKey||e.metaKey) && e.key==='-'){ e.preventDefault(); zoomOut(); }
    if((e.ctrlKey||e.metaKey) && e.key==='0'){ e.preventDefault(); zoomReset(); }
  });

  initPan();
  initSwipe();     // ← touch swipe (disabled when zoom > 1)
  applyZoom();
  applyResponsive();
  updateUI(0);

  $('loader').style.display = 'none';
  $('app').style.display    = 'flex';
});
</script>
